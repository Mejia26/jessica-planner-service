server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: agile-task-service
  servlet:
    multipart:
      max-file-size: ${APP_STORAGE_MAX_FILE_SIZE:10MB}
      max-request-size: ${APP_STORAGE_MAX_FILE_SIZE:10MB}
  datasource:
    url: jdbc:postgresql://j
    username: a
    password: A
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC
  flyway:
    enabled: ${APP_FLYWAY_ENABLED:false}
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: ${REDIS_TIMEOUT:2s}
      repositories:
        enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

logging:
  level:
    root: INFO
    com.guido.agiletaskservice: ${APP_LOG_LEVEL:INFO}
    org.springframework.web: WARN
    org.hibernate.SQL: WARN

app:
  cache:
    provider: ${APP_CACHE_PROVIDER:NONE}
    key-prefix: ${APP_CACHE_KEY_PREFIX:agile-task-service}
    default-ttl-seconds: ${APP_CACHE_DEFAULT_TTL_SECONDS:300}
  storage:
    provider: ${APP_STORAGE_PROVIDER:GOOGLE_CLOUD_STORAGE}
    max-file-size: ${APP_STORAGE_MAX_FILE_SIZE:25MB}
    local:
      root-path: ${APP_STORAGE_LOCAL_ROOT_PATH:./data/uploads}
      public-base-url: ${APP_STORAGE_LOCAL_PUBLIC_BASE_URL:http://localhost:8080/resources}
    aws-s3:
      bucket-name: ${AWS_S3_BUCKET_NAME:}
      region: ${AWS_REGION:us-east-1}
      key-prefix: ${AWS_S3_KEY_PREFIX:agile-task-service}
      public-base-url: ${AWS_S3_PUBLIC_BASE_URL:}
    google-cloud:
      bucket-name: ${GCP_STORAGE_BUCKET_NAME:d}
      project-id: ${GCP_PROJECT_ID:j}
      key-prefix: ${GCP_STORAGE_KEY_PREFIX:a}
      public-base-url: ${GCP_STORAGE_PUBLIC_BASE_URL:}
