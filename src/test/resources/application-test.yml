spring:
  datasource:
    url: jdbc:h2:mem:agile_task_service;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false
  data:
    redis:
      repositories:
        enabled: false

app:
  cache:
    provider: NONE
    key-prefix: agile-task-service-test
    default-ttl-seconds: 60
  storage:
    provider: LOCAL
    max-file-size: 1MB
    local:
      root-path: ./target/test-uploads
      public-base-url:
